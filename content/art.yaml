    - date: 2025-10-04
      title: "X-frames-per-space exhibition"
      type: "exhibition"
      publisher: "Parnass"
      url: "https://www.parnass.at/news/x-frames-per-space"
      description: |
        <p>A collaborative exploration by LBI-NetMed and Vienna Contemporary Art Space into how scientific data and artistic perspectives shape our reality.</p>
        <p>We are kicking off 2025 with a feature in the international PARNASS art magazine highlighting “X FRAMES PER SPACE – different logics, shared questions.” Organized by the Ludwig Boltzmann Institute for Network Medicine in partnership with Vienna Contemporary Art Space, this exhibition transformed 1,200 square meters into a “mycelial network” where art, science, and technology nourished one another.</p>
        <p>The project, realized in cooperation with the LBG Open Innovation in Science Center and Vienna Art Week, featured contributions from our multidisciplinary team of experts in medicine, physics, and art. It examined the interaction between scientific data and artistic production, opening new pathways for future connections. While the exhibition has closed, the collaborative networks it sparked remain active and continue to resonate within our research.</p>
        <p>Interdisciplinary Exhibition “X FRAMES PER SPACE” featured in PARNASS Art Magazine</p>

        <hr>

        <p><strong>Contributions by the lab</strong></p>
        <p><i>The puzzle of microanatomy</i>, Andre Rendeiro</p>
        <p>What are we made of? Is it the atoms in our body, the cells in our brain?</p>
        <p>At the mesoscale (hundreds of microns to centimeter scale) our cells arrange themselves into microanatomical structures each associated with a function for the respective organ - the mucosa of the stomach provides a barrier, the muscle movement for digestion; pancreatic ducts drive digestive juices out of the pancreas; the outer layer of the coronary artery provides support and elasticity.</p>
        <p>Finding these microanatomical domains is not easy, but that's one of our projects. In this Frame, you get to participate! What organs are represented? Which domains are connected? What is their coordinated function?</p>

        <hr>

        <p><i>Tissue turbulence</i>, Shrestha Srivastava</p>
        <p>The starry night, a painting that at first glance depicts a serene village under a clear night sky, but upon looking closely we understand Van Gogh's turbulent perception of the world.</p>
        <p>Similarly, tissues can appear deceptively normal on whole-slide imaging. Only when we zoom in do the hidden details emerge, interstitial fat deposition, narrowed or damaged vessels, inflammatory infiltrates, cellular atrophy, and other subtle changes that reflect underlying biological processes.</p>

        <hr>
